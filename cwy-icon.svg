<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .cwy-bg { fill: #060b12; }
      .cwy-wave-1 { stroke: #61f2ff; fill: none; stroke-width: 2.5; }
      .cwy-wave-2 { stroke: #ffd166; fill: none; stroke-width: 2; }
      .cwy-node { fill: #61f2ff; }
      .cwy-accent { fill: #ffd166; }
      .cwy-text { font-family: Orbitron, monospace; font-size: 28px; font-weight: 700; fill: #61f2ff; letter-spacing: 1px; }
    </style>
    <linearGradient id="cwyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61f2ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffd166;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="cwy-bg" width="200" height="200" />
  <circle cx="100" cy="100" r="95" fill="url(#cwyGrad)" opacity="0.5" />

  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#61f2ff" stroke-width="1.5" opacity="0.4" />

  <!-- Inner grid ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffd166" stroke-width="0.8" opacity="0.3" />

  <!-- Top wave (cyan) -->
  <path class="cwy-wave-1" d="M 40 85 Q 60 65 80 75 T 120 75 T 160 85" />

  <!-- Bottom wave (gold) -->
  <path class="cwy-wave-2" d="M 40 125 Q 60 145 80 135 T 120 135 T 160 125" />

  <!-- Center graph nodes -->
  <circle class="cwy-node" cx="75" cy="100" r="3.5" opacity="0.8" />
  <circle class="cwy-node" cx="100" cy="95" r="2.5" />
  <circle class="cwy-node" cx="125" cy="100" r="3.5" opacity="0.8" />
  <circle class="cwy-accent" cx="100" cy="115" r="2" opacity="0.7" />

  <!-- Connecting lines -->
  <line x1="75" y1="100" x2="100" y2="95" stroke="#61f2ff" stroke-width="1" opacity="0.5" />
  <line x1="100" y1="95" x2="125" y2="100" stroke="#61f2ff" stroke-width="1" opacity="0.5" />
  <line x1="100" y1="95" x2="100" y2="115" stroke="#ffd166" stroke-width="1" opacity="0.4" />

  <!-- Lightning accent (top right) -->
  <polyline points="145,60 152,70 148,72 156,85" class="cwy-wave-1" stroke-width="1.5" />

  <!-- Center "C" monogram -->
  <text x="100" y="115" text-anchor="middle" dominant-baseline="middle" class="cwy-text" opacity="0.7">C</text>

  <!-- Pulse glow effect (animated with SVG) -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#61f2ff" stroke-width="1" opacity="0.2" />
</svg>
